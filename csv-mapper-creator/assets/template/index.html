<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Mapper | Global & Local Flood Risk Analysis</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Local Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Full-screen Map Container -->
    <div id="map"></div>

    <!-- UI Overlay -->
    <div id="drop-zone" class="overlay active">
        <div class="glass-card">
            <div class="icon">📁</div>
            <h1>Drop CSV Dataset</h1>
            <p>Drag and drop your CSV file here to instantly visualize it on the map.</p>
            <div class="requirements">
                <small>Requires columns like: <code>lat</code>, <code>long</code>, or <code>anonymous_lat</code></small>
            </div>
            <label for="file-upload" class="btn">Select File</label>
            <input type="file" id="file-upload" accept=".csv" style="display: none;">
        </div>
    </div>

    <!-- Info/Status Panel (Initially Hidden) -->
    <div id="status-panel" class="overlay bottom-right">
        <div class="glass-card mini">
            <h2 id="status-title">Dataset Ready</h2>
            <p id="status-info">No data loaded.</p>
            <button id="reset-btn" class="btn secondary">Clear & Reload</button>
        </div>
    </div>

    <!-- Libraries -->
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- PapaParse JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Local Logic -->
    <script src="script.js"></script>
</body>
</html>
